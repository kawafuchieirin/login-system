services:
  # Local DynamoDB
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: login-system-dynamodb
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # DynamoDB Admin UI
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: login-system-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
    depends_on:
      dynamodb-local:
        condition: service_healthy

  # DynamoDB table initialization
  dynamodb-init:
    image: amazon/aws-cli:latest
    container_name: login-system-dynamodb-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_DEFAULT_REGION: ap-northeast-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Create users table with GSI
        aws dynamodb create-table \
          --table-name login-system-users \
          --attribute-definitions \
            AttributeName=pk,AttributeType=S \
            AttributeName=email,AttributeType=S \
          --key-schema \
            AttributeName=pk,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes \
            '[{"IndexName":"email-index","KeySchema":[{"AttributeName":"email","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --endpoint-url http://dynamodb-local:8000 || true

        # Create todos table
        aws dynamodb create-table \
          --table-name login-system-todos \
          --attribute-definitions \
            AttributeName=pk,AttributeType=S \
            AttributeName=sk,AttributeType=S \
          --key-schema \
            AttributeName=pk,KeyType=HASH \
            AttributeName=sk,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 || true

        echo "All tables created successfully!"

volumes:
  dynamodb-data:
